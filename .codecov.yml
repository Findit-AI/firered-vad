coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

ignore:
  - "benches/"
  - "examples/"
  - "tests/"
  - "build.rs"

codecov:
  require_ci_to_pass: true
  notify:
    require_ci_to_pass: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: false

